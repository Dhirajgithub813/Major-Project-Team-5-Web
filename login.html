<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Coriz-O-Mart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <div class="logo-animation-container">
            <img src="images/logo.png" alt="Coriz-O-Mart Logo" id="sliding-logo">
        </div>
    </div>

    <div id="login-wrapper" class="hidden">
        <div class="login-card">
            <div class="login-header">
                <img src="images/logo.png" alt="Logo" class="form-logo">
                <h2>Welcome Back!</h2>
                <p>Please login to your account</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label>Email or Mobile Number</label>
                    <input type="text" id="user-input" placeholder="Enter Email/Mobile" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password-input" placeholder="Enter Password" required>
                </div>

                <div class="form-options">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">LOGIN</button>
                
                <p class="signup-link">New to Coriz-O-Mart? <a href="#">Sign Up now</a></p>
            </form>
        </div>
    </div>

    <script src="api-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
