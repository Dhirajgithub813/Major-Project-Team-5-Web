<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Coriz-O-Mart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="orders-page">

    <header class="header">
        <div class="navbar-top">
            <a href="profile.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div class="title-group">
                <div class="purple-bar"></div>
                <h2 class="section-title">My Orders</h2>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="order-list-wrapper">
            <!-- Single Order Card -->
            <div class="order-card">
                <div class="order-img-box">
                    <img src="images/placeholder.png" alt="Product">
                </div>
                
                <div class="order-details">
                    <div class="order-header-row">
                        <h4 class="product-name">Eyeshadow Palette with Mirror</h4>
                        <span class="status-badge success">SUCCESS</span>
                    </div>
                    <p class="delivery-date">Delivered on 02-May-2026</p>
                    <p class="order-price">₹1599</p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
