<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | Coriz-O-Mart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="notifications-page">

    <header class="header">
        <div class="navbar-top">
            <!-- Navigation back to the Account/Profile page -->
            <a href="profile.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div class="title-group">
                <div class="purple-bar"></div>
                <h2 class="section-title">Notifications</h2>
            </div>
        </div>
    </header>

    <main class="main-container">
        
        <!-- BACKEND: This section will be dynamically filled with notifications from the database -->
        <div id="notification-list">
            
            <!-- Example of an Order Update Notification -->
            <div class="notification-card">
                <div class="icon-box shipping">
                    <i class="fa-solid fa-truck-fast"></i>
                </div>
                <div class="notification-content">
                    <h4 class="notif-title">Order Shipped!</h4>
                    <p class="notif-text">Your order for 'Eyeshadow Palette' is on its way.</p>
                    <span class="notif-time">2 hours ago</span>
                </div>
            </div>

            <!-- Example of a Promotion Notification -->
            <div class="notification-card">
                <div class="icon-box promotion">
                    <i class="fa-solid fa-tag"></i>
                </div>
                <div class="notification-content">
                    <h4 class="notif-title">Flash Sale!</h4>
                    <p class="notif-text">Get 50% off on all lipsticks today only.</p>
                    <span class="notif-time">Yesterday</span>
                </div>
            </div>

            <!-- BACKEND: Placeholder if no notifications are found -->
            <div id="empty-notifications">
                <i class="fa-solid fa-bell-slash"></i>
                <p>No notifications yet!</p>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
