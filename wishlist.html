    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Wishlist | Coriz-O-Mart</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="wishlist-page">

        <header class="header">
            <div class="navbar-top">
                <a href="profile.html" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div class="title-group">
                    <div class="purple-bar"></div>
                    <h2 class="section-title">My Wishlist</h2>
                </div>
            </div>
        </header>

        <main class="main-container">
            
            <!-- Wishlist Item -->
            <div class="wishlist-card">
                <div class="product-img-box">
                    <img src="images/placeholder.png" alt="Product">
                </div>

                <div class="wishlist-details">
                    <div class="wishlist-header-row">
                        <h4 class="product-name">Red Lipstick - Matte Finish</h4>
                        <button class="heart-btn">
                            <i class="fa-solid fa-heart"></i>
                        </button>
                    </div>
                    <p class="product-price">₹1039</p>
                    
                    <div class="wishlist-actions">
                        <button class="add-to-cart-btn">Add to Cart</button>
                        <button class="remove-btn">Remove</button>
                    </div>
                </div>
            </div>

            <!-- Another Item Example -->
            <div class="wishlist-card">
                <div class="product-img-box">
                    <img src="images/placeholder.png" alt="Product">
                </div>

                <div class="wishlist-details">
                    <div class="wishlist-header-row">
                        <h4 class="product-name">Eyeshadow Palette</h4>
                        <button class="heart-btn">
                            <i class="fa-solid fa-heart"></i>
                        </button>
                    </div>
                    <p class="product-price">₹1599</p>
                    
                    <div class="wishlist-actions">
                        <button class="add-to-cart-btn">Add to Cart</button>
                        <button class="remove-btn">Remove</button>
                    </div>
                </div>
            </div>

        </main>

    </body>
    </html>
